<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>InspectFlow</title>
    <link rel="stylesheet" href="styles/ui.css" />
    <style>
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elevated);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .toolbar .spacer { flex: 1; }

      .change-list {
        padding: 8px 14px;
      }

      .change-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        margin: 6px 0;
      }

      .change-card:hover {
        border-color: var(--accent);
      }

      .change-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }

      .change-property {
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        font-size: 12px;
        color: var(--text);
        font-weight: 600;
      }

      .change-value {
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        font-size: 12px;
        color: var(--ok);
      }

      .change-selector {
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        font-size: 11px;
        color: var(--accent);
        margin-bottom: 2px;
      }

      .change-file {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .change-file.missing {
        color: var(--warn);
      }

      .change-meta {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .badge-nofile {
        font-size: 10px;
        background: rgba(251,191,36,0.15);
        color: var(--warn);
        border-radius: 4px;
        padding: 1px 5px;
      }

      button.capture-btn {
        min-width: 100px;
      }

      button.capture-btn.active {
        background: var(--err);
      }

      button.capture-btn.active:hover {
        background: #ef4444;
      }

      .send-status {
        font-size: 10px;
        margin-top: 3px;
        min-height: 14px;
      }

      .send-status.sending { color: var(--text-muted); }
      .send-status.sent    { color: var(--ok); }
      .send-status.failed  { color: var(--err); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .card-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .card-actions button {
        font-size: 11px;
        padding: 4px 10px;
      }

      .diff-block {
        margin-top: 8px;
        background: #12131c;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        overflow-x: auto;
      }

      .diff-block pre {
        margin: 0;
        font-size: 11px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .diff-line-del  { color: var(--del); }
      .diff-line-add  { color: var(--add); }
      .diff-line-ctx  { color: var(--text-muted); }
      .diff-line-hdr  { color: var(--accent); }

      .diff-label {
        font-size: 10px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .apply-success {
        font-size: 11px;
        color: var(--ok);
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <img src="icons/icon-16.png" alt="" />
      <span style="font-weight:600; font-size:13px">InspectFlow</span>
      <span class="spacer"></span>
      <span class="status">
        <span id="server-dot" class="dot"></span>
        <span id="server-text" class="muted" style="font-size:11px">—</span>
      </span>
      <button id="capture-btn" class="capture-btn">Start Capture</button>
      <button id="clear-btn" class="secondary" title="Clear captured changes">Clear</button>
    </div>

    <div id="capture-error" style="display:none; padding:8px 14px;">
      <div class="card" style="border-color:var(--err); color:var(--err); font-size:12px;" id="capture-error-text"></div>
    </div>

    <div id="target-row" style="padding:4px 14px 0; display:none;">
      <span class="hint" id="inspected-target"></span>
    </div>

    <div class="change-list" id="change-list">
      <div class="empty" id="empty-msg">
        Click <strong>Start Capture</strong>, then edit a style in the
        Elements → Styles panel to begin.
      </div>
    </div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
